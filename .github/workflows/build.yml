name: build

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build_and_test:
    name: build_and_test
    runs-on: ubuntu-latest
    container:
      image: ros:kilted-ros-base
    steps:
      - name: Add OSRF Gazebo repository
        run: |
          curl https://packages.osrfoundation.org/gazebo.gpg --output /usr/share/keyrings/pkgs-osrf-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/pkgs-osrf-archive-keyring.gpg] http://packages.osrfoundation.org/gazebo/ubuntu-stable $(lsb_release -cs) main" | tee /etc/apt/sources.list.d/gazebo-stable.list > /dev/null
          apt-get update

      - name: Install build dependencies
        run: |
          apt-get update && apt-get upgrade -y
          apt-get install -y python3-colcon-common-extensions python3-toml libabsl-dev

      - name: Set up git authentication
        run: |
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global credential.helper store

      - name: Checkout
        uses: actions/checkout@v4

      - name: Sanitize aic.repos
        run: |
          python3 -c "
          import sys
          with open('aic.repos', 'r') as f:
              lines = f.readlines()
          output = []
          skip = 0
          for line in lines:
              if skip > 0:
                  skip -= 1
                  continue
              if 'gazebo/gz_cmake_vendor:' in line or \
                 'gazebo/gz_math_vendor:' in line or \
                 'gazebo/gz_msgs_vendor:' in line or \
                 'gazebo/gz_transport_vendor:' in line or \
                 'gazebo/gz_utils_vendor:' in line:
                  skip = 3
                  continue
              output.append(line)
          with open('aic_ci.repos', 'w') as f:
              f.writelines(output)
          "

      - name: Build and run tests
        uses: ros-tooling/action-ros-ci@v0.4
        with:
          target-ros2-distro: kilted
          skip-tests: true
          token: ${{ secrets.GITHUB_TOKEN }}
          vcs-repo-file-url: ${{ github.workspace }}/aic_ci.repos
          colcon-defaults: |
            {
              "build": {
                "cmake-args": [
                  "-DCMAKE_BUILD_TYPE=Release"
                ]
              }
            }
          rosdep-skip-keys: "gz-cmake3 DART libogre-dev libogre-next-2.3-dev rosetta"
